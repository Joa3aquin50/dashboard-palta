.topbar{background:#132f5e;color:#fff;padding:11px 18px;display:flex;align-items:center;gap:12px;border-radius:10px 10px 0 0}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}

.kpi{background:var(--bg3);border-radius:6px;padding:7px 8px}
.kv{font-size:17px;font-weight:600;color:var(--t1)}
.kl{font-size:9px;color:var(--t2);margin-top:1px}
.clabel{font-size:10px;color:var(--t2);margin-bottom:5px;margin-top:11px}
.cw{position:relative;width:100%;height:115px}
.legrow{display:flex;gap:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.lsq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.defrow{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.di{display:flex;align-items:center;gap:5px}
.dn{font-size:10px;color:var(--t2);width:120px;flex-shrink:0;text-align:right}
.dbbg{flex:1;background:var(--bg3);border-radius:3px;height:11px;overflow:hidden}
.dbfill{height:100%;border-radius:3px}
.dv{font-size:10px;font-weight:600;width:36px;text-align:right;flex-shrink:0}
.tcard{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.thead{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--t1)}
.tcw{position:relative;width:100%;height:160px}
.tleg{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.empty{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:36px;text-align:center;color:var(--t2);font-size:12px}

['Sem18','Sem19','Sem20'].forEach(v=>document.getElementById('f-se').insertAdjacentHTML('beforeend',`<option>${v}</option>`));

function gf(){return{fu:document.getElementById('f-fu').value,de:document.getElementById('f-de').value,ca:document.getElementById('f-ca').value,se:document.getElementById('f-se').value};}
function matchF(r,d){const f=gf();return(!d||r.Días===d)&&(!f.fu||r.Fundo===f.fu)&&(!f.de||r['País Destino']===f.de)&&(!f.ca||String(r.Calibre)===f.ca)&&(!f.se||r.Semana===f.se);}
function pct(c){return+(100-(c&&c[0]||0)).toFixed(1);}
function trafCol(v){return v>25?'#c0392b':v>10?'#e67e22':v>0?'#f39c12':'#27ae60';}
function fwCol(v){return v==null?'var(--t1)':v>=1.5?'#27ae60':v>=1.1?'#f39c12':'#c0392b';}

function getFirmeza(fundo,diasVal){
  const f=gf();
  const recs=DM.filter(r=>r.Fundo===fundo&&r.Días===diasVal&&(!f.de||r['País Destino']===f.de)&&(!f.ca||String(r.Calibre)===f.ca)&&(!f.se||r.Semana===f.se));
  let fw=0,fc=0;
  for(const r of recs)if(r.fw>0){fw+=r.fw*r.n;fc+=r.n;}
  return fc>0?+(fw/fc).toFixed(2):null;
}

function aggAM(recs){
  const m={};
  for(const r of recs){
    if(!m[r.Fundo])m[r.Fundo]={n:0,dl:{},sec:{mp:{},ms:{},mf:{},pg:{},hv:{}}};
    const x=m[r.Fundo];x.n+=r.n;
    for(const[k,v]of Object.entries(r.dl||{}))x.dl[k]=(x.dl[k]||0)+v*r.n;
    for(const mk of AM_SEC)for(const[k,v]of Object.entries(r[mk]||{}))x.sec[mk][k]=(x.sec[mk][k]||0)+v*r.n;
  }
  for(const x of Object.values(m)){
    for(const k in x.dl)x.dl[k]=+(x.dl[k]/x.n).toFixed(1);
    for(const mk of AM_SEC)for(const k in x.sec[mk])x.sec[mk][k]=+(x.sec[mk][k]/x.n).toFixed(1);
  }
  return m;
}

function aggDM(recs){
  const m={};
  for(const r of recs){
    if(!m[r.Fundo])m[r.Fundo]={n:0,fw:0,fc:0,dw:0,dc:0,def:{mh:{},pp:{},ppu:{},hp:{},pg:{},me:{}}};
    const x=m[r.Fundo];x.n+=r.n;
    if(r.fw>0){x.fw+=r.fw*r.n;x.fc+=r.n;}
    if(r.dm>0&&r.dm<100){x.dw+=r.dm*r.n;x.dc+=r.n;}
    for(const mk of DM_MK)for(const[k,v]of Object.entries(r[mk]||{}))x.def[mk][k]=(x.def[mk][k]||0)+v*r.n;
  }
  for(const x of Object.values(m)){
    x.firmeza=x.fc>0?+(x.fw/x.fc).toFixed(2):null;
    x.diasMad=x.dc>0?+(x.dw/x.dc).toFixed(1):null;
    for(const mk of DM_MK)for(const k in x.def[mk])x.def[mk][k]=+(x.def[mk][k]/x.n).toFixed(1);
  }
  return m;
}

function aggTrend(){
  const src=mode==='am'?AM:DM;
  const f=gf();
  const recs=src.filter(r=>(!f.fu||r.Fundo===f.fu)&&(!f.de||r['País Destino']===f.de)&&(!f.ca||String(r.Calibre)===f.ca)&&(!f.se||r.Semana===f.se));
  const m={};
  for(const r of recs){
    if(!m[r.Fundo])m[r.Fundo]={};
    if(!m[r.Fundo][r.Días])m[r.Fundo][r.Días]={n:0,dl:{},sec:{mp:{},ms:{},mf:{},pg:{},hv:{}},def:{mh:{},pp:{},ppu:{},hp:{},pg:{},me:{}}};
    const x=m[r.Fundo][r.Días];x.n+=r.n;
    if(mode==='am'){
      for(const[k,v]of Object.entries(r.dl||{}))x.dl[k]=(x.dl[k]||0)+v*r.n;
      for(const mk of AM_SEC)for(const[k,v]of Object.entries(r[mk]||{}))x.sec[mk][k]=(x.sec[mk][k]||0)+v*r.n;
    } else {
      for(const mk of DM_MK)for(const[k,v]of Object.entries(r[mk]||{}))x.def[mk][k]=(x.def[mk][k]||0)+v*r.n;
    }
  }
  for(const fu of Object.keys(m))for(const d of Object.keys(m[fu])){
    const x=m[fu][d];
    if(mode==='am'){
      for(const k in x.dl)x.dl[k]=+(x.dl[k]/x.n).toFixed(1);
      for(const mk of AM_SEC)for(const k in x.sec[mk])x.sec[mk][k]=+(x.sec[mk][k]/x.n).toFixed(1);
    } else {
      for(const mk of DM_MK)for(const k in x.def[mk])x.def[mk][k]=+(x.def[mk][k]/x.n).toFixed(1);
    }
  }
  return m;
}

function killCharts(){Object.values(cMap).forEach(c=>{try{c.destroy()}catch(e){}});cMap={};}

function mkStackedBar(id,dl,pal){
  const el=document.getElementById(id);if(!el)return;
  const ds=['1','2','3','4'].map((n,i)=>({label:`Nivel ${n}`,data:[dl[n]||0],backgroundColor:pal[i],borderWidth:0}));
  cMap[id]=new Chart(el,{type:'bar',data:{labels:[''],datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(1)}%`}}},scales:{x:{stacked:true,grid:{display:false},ticks:{display:false}},y:{stacked:true,max:100,ticks:{callback:v=>v+'%',font:{size:10},color:'#888'},grid:{color:'rgba(128,128,128,0.1)'}}}}});
}

function mkTrendAM(id,byDias){
  const el=document.getElementById(id);if(!el)return;
  const labels=DIAS_AM.filter(d=>byDias[d]&&byDias[d].n>0);
  if(!labels.length)return;
  const ds=['1','2','3','4'].map((n,i)=>({label:`N${n}`,data:labels.map(d=>+(byDias[d]&&byDias[d].dl[n]||0)),backgroundColor:AM_GREEN[i],borderWidth:0}));
  cMap[id]=new Chart(el,{type:'bar',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(1)}%`}}},scales:{x:{stacked:true,ticks:{font:{size:10},color:'#888'},grid:{display:false}},y:{stacked:true,max:100,ticks:{callback:v=>v+'%',font:{size:10},color:'#888'},grid:{color:'rgba(128,128,128,0.1)'}}}}});
}

// DM trend: MH con nivel 0 (sin defecto) + nivel 1 + nivel 2+ → suma 100%
function mkTrendDM(id,byDias){
  const el=document.getElementById(id);if(!el)return;
  const labels=DIAS_DM.filter(d=>byDias[d]&&byDias[d].n>0);
  if(!labels.length)return;
  const getMH=(d,k)=>{
    const mh=byDias[d]&&byDias[d].def&&byDias[d].def.mh||{};
    if(k==='0')return+(mh[0]||0).toFixed(1);
    if(k==='1')return+(mh[1]||0).toFixed(1);
    // nivel 2+ : todo lo que no es 0 ni 1
    return+(Object.entries(mh).filter(([kk])=>+kk>=2).reduce((s,[,v])=>s+v,0)).toFixed(1);
  };
  const ds=[
    {label:'Sin defecto (N0)',data:labels.map(d=>getMH(d,'0')),backgroundColor:MH_ORANGE[0],borderWidth:0},
    {label:'MH nivel 1',       data:labels.map(d=>getMH(d,'1')),backgroundColor:MH_ORANGE[1],borderWidth:0},
    {label:'MH nivel 2+',      data:labels.map(d=>getMH(d,'2+')),backgroundColor:MH_ORANGE[2],borderWidth:0},
  ];
  cMap[id]=new Chart(el,{type:'bar',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(1)}%`}}},
    scales:{x:{stacked:true,ticks:{font:{size:10},color:'#888'},grid:{display:false}},y:{stacked:true,max:100,ticks:{callback:v=>v+'%',font:{size:10},color:'#888'},grid:{color:'rgba(128,128,128,0.1)'}}}}});
}

function defBar(name,val){
  const c=trafCol(val);
  return `<div class="di"><span class="dn">${name}</span><div class="dbbg"><div class="dbfill" style="width:${Math.min(val,100)}%;background:${c}"></div></div><span class="dv" style="color:${c}">${val.toFixed(1)}%</span></div>`;
}

function renderAMcards(byF){
  if(!Object.keys(byF).length)return'<div class="empty">Sin datos para la selección.</div>';
  return Object.keys(byF).map(f=>{
    const d=byF[f];
    const n2=+(Object.entries(d.dl).filter(([k])=>+k>=2).reduce((s,[,v])=>s+v,0)).toFixed(1);
    const moho=pct(d.sec.mp);
    const fw=getFirmeza(f,dias);
    return `<div class="card">
      <div class="ch"><span class="fdot" style="background:${FC[f]||'#888'}"></span><div><div class="cn">${f}</div><div class="cn2">${d.n} frutas · ${dias}</div></div></div>
      <div class="krow">
        <div class="kpi"><div class="kv" style="color:${trafCol(n2)}">${n2}%</div><div class="kl">DL nivel 2+</div></div>
        <div class="kpi"><div class="kv" style="color:${trafCol(moho)}">${moho}%</div><div class="kl">Moho c/ defecto</div></div>
        <div class="kpi"><div class="kv" style="color:${fwCol(fw)}">${fw!=null?fw+' kgf':'—'}</div><div class="kl">Firmeza prom.</div></div>
      </div>
      <div class="clabel">Daño Lenticelar — distribución por nivel</div>
      <div class="cw"><canvas id="dl-${f}" role="img" aria-label="DL ${f}"></canvas></div>
      <div class="clabel" style="margin-top:12px">Otros defectos — % afectadas</div>
      <div class="defrow">${AM_SEC.map(mk=>defBar(AM_LBL[mk],pct(d.sec[mk]))).join('')}</div>
    </div>`;
  }).join('');
}

function renderDMcards(byF){
  if(!Object.keys(byF).length)return'<div class="empty">Sin datos DM. (Disponible en 18 y 25 días)</div>';
  return Object.keys(byF).map(f=>{
    const d=byF[f];
    return `<div class="card">
      <div class="ch"><span class="fdot" style="background:${FC[f]||'#888'}"></span><div><div class="cn">${f}</div><div class="cn2">${d.n} frutas · ${dias}</div></div></div>
      <div class="krow2">
        <div class="kpi"><div class="kv" style="color:${fwCol(d.firmeza)}">${d.firmeza!=null?d.firmeza+' kgf':'—'}</div><div class="kl">Firmeza prom.</div></div>
        <div class="kpi"><div class="kv" style="color:var(--t1)">${d.diasMad!=null?d.diasMad+' d':'—'}</div><div class="kl">Días maduración</div></div>
      </div>
      <div class="clabel">Defectos — % frutas con algún defecto</div>
      <div class="defrow">${DM_MK.map(mk=>defBar(DM_LBL[mk],pct(d.def[mk]))).join('')}</div>
    </div>`;
  }).join('');
}

function renderTrendCards(trend,fundos){
  const amLeg=AM_GREEN.map((c,i)=>`<span class="li"><span class="lsq" style="background:${c}"></span>N${i+1}</span>`).join('');
  const dmLeg=`<span class="li"><span class="lsq" style="background:${MH_ORANGE[0]};border:1px solid #ddd"></span>Sin defecto</span><span class="li"><span class="lsq" style="background:${MH_ORANGE[1]}"></span>MH nivel 1</span><span class="li"><span class="lsq" style="background:${MH_ORANGE[2]}"></span>MH nivel 2+</span>`;
  return fundos.map(f=>`<div class="tcard">
    <div class="thead" style="color:${FC[f]||'var(--t1)'}">${f} — ${mode==='am'?'Daño Lenticelar':'Mad. Heterogénea'} por días de almacenamiento</div>
    <div class="tcw"><canvas id="tr-${f}" role="img" aria-label="Tendencia ${f}"></canvas></div>
    <div class="tleg">${mode==='am'?amLeg:dmLeg}</div>
  </div>`).join('');
}

function render(){
  killCharts();
  document.getElementById('top-lbl').textContent=`Resultados — ${dias} (${mode==='am'?'AM · Fruta fría':'DM · Fruta madurada'})`;
  const src=mode==='am'?AM:DM;
  const byF=mode==='am'?aggAM(src.filter(r=>matchF(r,dias))):aggDM(src.filter(r=>matchF(r,dias)));
  document.getElementById('cards').innerHTML=mode==='am'?renderAMcards(byF):renderDMcards(byF);
  document.getElementById('leg').innerHTML=mode==='am'?AM_GREEN.map((c,i)=>`<span class="li"><span class="lsq" style="background:${c}"></span>Nivel ${i+1}</span>`).join(''):'';
  const trend=aggTrend();
  const f=gf();
  const tFundos=Object.keys(trend).filter(fu=>!f.fu||fu===f.fu);
  document.getElementById('tcards').innerHTML=renderTrendCards(trend,tFundos);
  setTimeout(()=>{
    for(const fu of Object.keys(byF))if(mode==='am')mkStackedBar(`dl-${fu}`,byF[fu].dl,AM_GREEN);
    for(const fu of tFundos)mode==='am'?mkTrendAM(`tr-${fu}`,trend[fu]):mkTrendDM(`tr-${fu}`,trend[fu]);
  },30);
}

document.getElementById('m-am').addEventListener('click',()=>{mode='am';document.getElementById('m-am').classList.add('on');document.getElementById('m-dm').classList.remove('on');render();});
document.getElementById('m-dm').addEventListener('click',()=>{mode='dm';document.getElementById('m-dm').classList.add('on');document.getElementById('m-am').classList.remove('on');render();});
document.querySelectorAll('.dtab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.dtab').forEach(x=>x.classList.remove('on'));t.classList.add('on');dias=t.dataset.d;render();}));
['f-fu','f-de','f-ca','f-se'].forEach(id=>document.getElementById(id).addEventListener('change',render));
render();
</script>
